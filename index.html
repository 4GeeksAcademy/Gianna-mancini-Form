<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <form>
        <div class="row bg-light p-1 border rounded-top ps-2">
            <h3>Payment form example</h3>
        </div>
        <div class="border">
        <div class="alert alert-danger" role="alert">
        Some fields are missing
        </div>
        <div class="row p-2">
            <div class="col-sm-12 col-md-5 col-lg-5">
                <label for="card">
                    <p>Card #</p>
                </label>
                <input type="text" name="card" class="form-control" placeholder="XXXXXXXXXXXXXXXX" aria-label="Username">
            </div>
             <div class="col-sm-12 col-md-3 col-lg-3">
                <label for="cvc">
                    <p>CVC #</p>
                </label>
                <input type="text" name="cvc" class="form-control" placeholder="0000" aria-label="Username">
            </div>
            <div class="col-sm-12 col-md-4 col-lg-4">
                <label for="amount">
                    <p>Amount</p>
                </label>
                <i class="fa-solid fa-dollar-sign"></i>
                <input type="text" name="amount" class="form-control" placeholder="Amount" aria-label="Username">
            </div>
        </div>
        <div class="row p-2">
            <div class="col-sm-12 col-md-6 col-lg-6">
                <div class="mb-3">
                 <label for="exampleFormControlInput1" class="form-label">First Name</label>
                  <input type="text" class="form-control" id="exampleFormControlInput1">
              </div>
              <div class="mb-3">
                 <label for="exampleFormControlInput1" class="form-label">City</label>
                  <input type="text" class="form-control" id="exampleFormControlInput1">
              </div>
              <div class="row">
                <p>We accept:</p>
                <div class="cards col-6">
                <div class="col-sm-12 col-md-2 col-lg-2 ps-3">
                <div class="form-check">
              <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault1">
                 <label class="form-check-label" for="flexRadioDefault1">
                  <i class="fa-brands fa-cc-mastercard" style="font-size: 21px;"></i>
                    </label>
                    </div>
                    </div>
                    <div class="col-sm-12 col-md-2 col-lg-2 ps-1">
                <div class="form-check">
                 <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault2" checked>
                <label class="form-check-label" for="flexRadioDefault2">
                <i class="fa-brands fa-cc-visa"  style="font-size: 21px;"></i>
                </label>
                </div>
            </div>
            <div class="col-sm-12 col-md-2 col-lg-2 ps-1">
                <div class="form-check">
                 <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault2" checked>
                <label class="form-check-label" for="flexRadioDefault2">
                <i class="fa-brands fa-cc-diners-club"  style="font-size: 21px;"></i>
                </label>
                </div>
            </div>
            <div class="col-sm-12 col-md-2 col-lg-2">
                <div class="form-check" >
                 <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault2" checked>
                <label class="form-check-label" for="flexRadioDefault2">
                <i class="fa-brands fa-cc-amex"  style="font-size: 21px;"></i>
                </label>
                </div>
            </div>
              </div>
              </div>
               </div>
                <div class="col-sm-12 col-md-6 col-lg-6">
                <div class="mb-3">
                 <label for="exampleFormControlInput1" class="form-label">Last Name</label>
                  <input type="text" class="form-control" id="exampleFormControlInput1">
                 <div class="row mt-3">
                    <div class="col-sm-12 col-md-6 col-lg-6"> 
                        <label for="exampleDataList" class="form-label">State</label>
             <select class="form-select" aria-label="Default select example">
              <option selected>Pick a state</option>
               <option value="1">Washington</option>
                <option value="2">Texas</option>
                <option value="3">Virginia</option>
                 <option value="4">Indiana</option>
                   <option value="5">California</option>
                </select>
                </div>
            <div class="col-sm-12 col-md-6 col-lg-6">
              <div class="mb-3">
                 <label for="exampleFormControlInput1" class="form-label">Postal Code</label>
                  <input type="text" class="form-control" id="exampleFormControlInput1">
              </div>
             </div>
             <div class="mb-3">
              <label for="exampleFormControlTextarea1" class="form-label">Message</label>
              <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
               <small class="form-text text-muted">Add any notes here.</small>
               </div>
              </div>
            </div>
        </div>
         </div>
      </div>
     <div class="row bg-light p-2 border rounded-bottom">
            <div class="d-grid gap-2 d-md-flex justify-content-md-end pt-1 pb-1">
            <button type="button" class="btn btn-secondary">Cancel</button>
            <button class="btn btn-primary" type="button">Send</button>
            </div>
    </form>
    </body>
